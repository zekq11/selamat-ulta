<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 Video Ucapan untuk Ibu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.8s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h2 {
            font-size: 2.8rem;
            color: #ff6b6b;
            margin-bottom: 20px;
            font-family: 'Dancing Script', cursive;
        }

        .sub {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            margin: 30px 0;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-end {
            background: rgba(255, 107, 107, 0.1);
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            font-size: 1.3rem;
            line-height: 1.8;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: #ff6b6b;
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-home {
            background: #4a69bd;
        }

        .footer {
            margin-top: 30px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎥 Kejutan Terakhir untuk Ibu</h2>
        <div class="sub">Dari kami berdua, dengan segenap cinta ❤️</div>

        <!-- 🔴 GANTI VIDEO UCAPAN DI SINI -->
        <div class="video-container">
            <video id="finalVideo" controls>
                <source src="video/ucapan.mp4" type="video/mp4">
                Browser tidak mendukung video.
            </video>
        </div>

        <div class="message-end">
            <p>🎂 Selamat ulang tahun, Ibu tersayang! 🎂</p>
            <p>Semoga panjang umur, sehat selalu, dan bahagia bersama kami.</p>
            <p>Kami sangat menyayangimu! ❤️</p>
        </div>

        <div class="btn-container">
            <button class="btn btn-home" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> Kembali ke Awal
            </button>
        </div>

        <div class="footer">
            Dengan cinta, [NAMA KAMU] & [NAMA ADEK]
        </div>
    </div>

    <!-- Audio TIDAK DIPASANG di halaman terakhir (hanya video) -->
    
    <script>
        // Tidak ada audio di halaman ini
        
        // Confetti saat halaman dibuka
        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.width = '10px';
                    confetti.style.height = '20px';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.zIndex = 9999;
                    document.body.appendChild(confetti);
                    
                    let pos = -10;
                    const interval = setInterval(() => {
                        pos += 5;
                        confetti.style.top = pos + 'px';
                        if (pos > window.innerHeight + 100) {
                            clearInterval(interval);
                            confetti.remove();
                        }
                    }, 20);
                }, i * 100);
            }
        }

        createConfetti();
    </script>
</body>
</html>
