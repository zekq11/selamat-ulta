<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Foto Kenangan Ibu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
            color: #4a69bd;
            margin-bottom: 20px;
        }

        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }

        /* Grid Foto */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .photo-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-card .caption {
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #333;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-prev {
            background: #95a5a6;
            color: white;
        }

        .btn-next {
            background: linear-gradient(135deg, #4a69bd, #6a89cc);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .page-indicator {
            text-align: center;
            margin-top: 20px;
            color: #999;
        }

        @media (max-width: 700px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 Kenangan Manis Bersama Ibu</h2>
        <div class="sub">Setiap foto menyimpan cerita dan kasih sayang</div>

        <!-- 🔴 GANTI FOTO-FOTO DI SINI -->
        <div class="photo-grid">
            <!-- Foto 1 -->
            <div class="photo-card">
                <img src="foto/foto1.jpg" alt="Foto 1" onerror="this.src='https://via.placeholder.com/300x200/4a69bd/ffffff?text=Foto+1'">
                <div class="caption">Momen bahagia bersama</div>
            </div>
            <!-- Foto 2 -->
            <div class="photo-card">
                <img src="foto/foto2.jpg" alt="Foto 2" onerror="this.src='https://via.placeholder.com/300x200/6a89cc/ffffff?text=Foto+2'">
                <div class="caption">Senyum Ibu yang menenangkan</div>
            </div>
            <!-- Foto 3 -->
            <div class="photo-card">
                <img src="foto/foto3.jpg" alt="Foto 3" onerror="this.src='https://via.placeholder.com/300x200/4a69bd/ffffff?text=Foto+3'">
                <div class="caption">Liburan bersama keluarga</div>
            </div>
            <!-- Foto 4 -->
            <div class="photo-card">
                <img src="foto/foto4.jpg" alt="Foto 4" onerror="this.src='https://via.placeholder.com/300x200/6a89cc/ffffff?text=Foto+4'">
                <div class="caption">Hari spesial kita</div>
            </div>
            <!-- Foto 5 -->
            <div class="photo-card">
                <img src="foto/foto5.jpg" alt="Foto 5" onerror="this.src='https://via.placeholder.com/300x200/4a69bd/ffffff?text=Foto+5'">
                <div class="caption">Kebersamaan yang tak terlupakan</div>
            </div>
            <!-- Foto 6 -->
            <div class="photo-card">
                <img src="foto/foto6.jpg" alt="Foto 6" onerror="this.src='https://via.placeholder.com/300x200/6a89cc/ffffff?text=Foto+6'">
                <div class="caption">Cinta Ibu sepanjang masa</div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-prev" onclick="location.href='halaman2.html'">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <button class="btn btn-next" onclick="location.href='halaman4.html'">
                Lanjut ke Foto Lainnya <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div class="page-indicator">
            Halaman 3 dari 5
        </div>
    </div>

    <!-- Audio -->
    <audio autoplay loop id="bgMusic">
        <source src="lagu_ultah.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.4;
        audio.play().catch(() => {
            document.addEventListener('click', function playOnce() {
                audio.play();
                document.removeEventListener('click', playOnce);
            }, { once: true });
        });
    </script>
</body>
</html>
