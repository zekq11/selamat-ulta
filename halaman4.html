<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Kenangan Bersama Ibu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fad0c4 0%, #ffd1ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
            color: #f8a5c2;
            margin-bottom: 20px;
        }

        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .photo-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-card .caption {
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #333;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-prev {
            background: #95a5a6;
            color: white;
        }

        .btn-next {
            background: linear-gradient(135deg, #f8a5c2, #f78fb3);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .page-indicator {
            text-align: center;
            margin-top: 20px;
            color: #999;
        }

        @media (max-width: 700px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 Lebih Banyak Kenangan</h2>
        <div class="sub">Setiap senyuman Ibu adalah kebahagiaan kami</div>

        <!-- 🔴 GANTI FOTO-FOTO DI SINI -->
        <div class="photo-grid">
            <!-- Foto 7 -->
            <div class="photo-card">
                <img src="foto/foto7.jpg" alt="Foto 7" onerror="this.src='https://via.placeholder.com/300x200/f8a5c2/ffffff?text=Foto+7'">
                <div class="caption">Momen tak terlupakan</div>
            </div>
            <!-- Foto 8 -->
            <div class="photo-card">
                <img src="foto/foto8.jpg" alt="Foto 8" onerror="this.src='https://via.placeholder.com/300x200/f78fb3/ffffff?text=Foto+8'">
                <div class="caption">Kebersamaan keluarga</div>
            </div>
            <!-- Foto 9 -->
            <div class="photo-card">
                <img src="foto/foto9.jpg" alt="Foto 9" onerror="this.src='https://via.placeholder.com/300x200/f8a5c2/ffffff?text=Foto+9'">
                <div class="caption">Liburan bersama</div>
            </div>
            <!-- Foto 10 -->
            <div class="photo-card">
                <img src="foto/foto10.jpg" alt="Foto 10" onerror="this.src='https://via.placeholder.com/300x200/f78fb3/ffffff?text=Foto+10'">
                <div class="caption">Hari istimewa</div>
            </div>
            <!-- Foto 11 -->
            <div class="photo-card">
                <img src="foto/foto11.jpg" alt="Foto 11" onerror="this.src='https://via.placeholder.com/300x200/f8a5c2/ffffff?text=Foto+11'">
                <div class="caption">Senyum Ibu</div>
            </div>
            <!-- Foto 12 -->
            <div class="photo-card">
                <img src="foto/foto12.jpg" alt="Foto 12" onerror="this.src='https://via.placeholder.com/300x200/f78fb3/ffffff?text=Foto+12'">
                <div class="caption">Cinta sejati</div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-prev" onclick="location.href='halaman3.html'">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <button class="btn btn-next" onclick="location.href='halaman5.html'">
                Kejutan Terakhir <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div class="page-indicator">
            Halaman 4 dari 5
        </div>
    </div>

    <!-- Audio -->
    <audio autoplay loop id="bgMusic">
        <source src="lagu_ultah.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.4;
        audio.play().catch(() => {
            document.addEventListener('click', function playOnce() {
                audio.play();
                document.removeEventListener('click', playOnce);
            }, { once: true });
        });
    </script>
</body>
</html>
