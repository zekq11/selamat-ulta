<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 Video Ucapan untuk Ibu Meida Dari Rafi si abang online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .special-message {
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        
        .btn-home {
            background: linear-gradient(135deg, #4a69bd, #6a89cc);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎥 Kejutan Terakhir untuk Ibu</h2>
        <div class="sub">Dari kami berdua, dengan segenap cinta</div>

        <!-- 🔴 VIDEO UCAPAN -->
        <div class="video-container">
            <video id="finalVideo" controls>
                <source src="video/ucapan.mp4" type="video/mp4">
                Browser tidak mendukung video.
            </video>
        </div>

        <div class="special-message">
            <p style="font-size: 1.5rem; font-family: 'Dancing Script', cursive;">🎂 Selamat ulang tahun, Ibu! 🎂</p>
            <p>Semoga panjang umur, sehat selalu, dan bahagia selalu.</p>
            <p style="font-size: 2rem;">❤️</p>
        </div>

        <div class="btn-container">
            <button class="btn btn-prev" onclick="location.href='halaman3.html'">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <button class="btn btn-home" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> Kembali ke Awal
            </button>
        </div>

        <div class="page-indicator">
            Halaman 4 dari 4
        </div>
        
        <div class="footer">
            Dengan cinta, Meida & Rafi Si Abang Online
        </div>
    </div>

    <!-- TIDAK ADA AUDIO di halaman video -->
    
    <script>
        // Confetti saat halaman dibuka
        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.width = '10px';
                    confetti.style.height = '20px';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.zIndex = 9999;
                    confetti.style.pointerEvents = 'none';
                    document.body.appendChild(confetti);
                    
                    let pos = -10;
                    const interval = setInterval(() => {
                        pos += 5;
                        confetti.style.top = pos + 'px';
                        if (pos > window.innerHeight + 100) {
                            clearInterval(interval);
                            confetti.remove();
                        }
                    }, 20);
                }, i * 100);
            }
        }

        createConfetti();
    </script>
</body>
</html>
